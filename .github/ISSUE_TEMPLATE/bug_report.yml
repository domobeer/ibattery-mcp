name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: dropdown
    id: device-type
    attributes:
      label: Which device type is this about, if any?
      options:
        - Not device-specific
        - Mac's own battery
        - Generic Bluetooth device
        - iPhone/iPad
        - Apple Watch
        - Other/unsure
    validations:
      required: true
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: "e.g. 15.1"
    validations:
      required: true
  - type: input
    id: ibattery-mcp-version
    attributes:
      label: ibattery-mcp version
      placeholder: "e.g. 0.1.0, or a commit SHA if built from source"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output/logs
      description: >-
        If applicable, paste any error output, crash reports, or MCP tool
        responses that show the problem.
      render: shell
