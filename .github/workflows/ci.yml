name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: List available Xcode versions (diagnostic)
        run: ls -d /Applications/Xcode*.app; xcodebuild -version; swift --version

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install dependencies
        run: brew install libimobiledevice pkg-config swiftlint

      - name: Lint
        run: swiftlint lint --strict

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Build BLE helper app bundle
        run: ./Scripts/build-ble-helper-app.sh
